        .tool-card:nth-child(3) { animation-delay: 0.15s; }

        .tool-card:nth-child(5) { animation-delay: 0.25s; }
        .tool-card:nth-child(6) { animation-delay: 0.3s; }
        .tool-card:nth-child(7) { animation-delay: 0.35s; }

        .loading-wrapper {

        .zalo-bubble {

            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #0066cc, #004499);
            border-radius: 50%;

            align-items: center;
            justify-content: center;

            text-decoration: none;

            75% { transform: translateY(-3px) rotate(-2deg); }
        }
        .zalo-bubble::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: rgba(0, 102, 204, 0.4);
            border-radius: 50%;
            z-index: -1;
            animation: pulseZalo 2s ease-in-out infinite;
        }
        @keyframes pulseZalo {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.15); }
        }
        
        @media (max-width: 1024px) { .filter-group { justify-content: center; } }
        @media (max-width: 768px) {
            .page-header h1 { font-size: 32px; }

            .zalo-bubble { width: 50px; height: 50px; bottom: 20px; right: 20px; }
            .zalo-bubble img { width: 28px; }
        }
        @media (max-width: 480px) {
            .page-header h1 { font-size: 28px; }
            .empty-state { padding: 40px 20px; }
            .loading-wrapper { padding: 40px 20px; }

<footer class="footer">
    <div class="container">
        <div class="footer-copyright"><p>&copy; 2026 Subsieure - Nguyễn Vinh Cypher</p></div>
    </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="js/sanpham.js"></script>
<script src="js/loading.js"></script>
<script>
    let allTools = [], filteredTools = [], currentUser = null, userBalance = 0;
    let currentCategory = 'all', currentSort = 'default', searchKeyword = '', currentPage = 1;
    let purchasedToolIds = [];
    const itemsPerPage = 9;
    
    const langNames = { python: 'Python', rust: 'Rust', cpp: 'C++', html: 'HTML', js: 'JavaScript', php: 'PHP', java: 'Java', go: 'Go' };
    const langIcons = { python: 'fab fa-python', rust: 'fas fa-cog', cpp: 'fas fa-code', html: 'fab fa-html5', js: 'fab fa-js', php: 'fab fa-php', java: 'fab fa-java', go: 'fab fa-golang' };
    
    const cursorGlow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
    });
    
    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
    
    function showLoadingGrid() {
        document.getElementById('productsGrid').innerHTML = `
            <div class="loading-wrapper">
                <div class="loading-spinner"></div>
                <p>Đang tải sản phẩm...</p>
            </div>
        `;
    }
    
    async function loadPurchasedTools() {
        if (!currentUser) {
            purchasedToolIds = [];
            return;
        }
        try {
            const snapshot = await window.db.collection('transactions')
                .where('userId', '==', currentUser.uid)
                .where('type', '==', 'purchase')
                .get();
            purchasedToolIds = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.toolId) {
                    purchasedToolIds.push(data.toolId);
                }
            });
            renderProducts();
        } catch (error) {
            console.error("Lỗi load purchased tools:", error);
        }
    }
    
    window.auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userEmailShort').innerText = user.email.split('@')[0];
            if (user.email === 'nguyenvinhhoang209@gmail.com') document.getElementById('adminLink').style.display = 'inline-block';
            try {
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                if (userDoc.exists) { userBalance = userDoc.data().balance || 0; document.getElementById('userBalance').innerText = userBalance.toLocaleString('vi-VN'); }
            } catch(e) { console.error("Lỗi lấy user:", e); }
            await loadPurchasedTools();
        } else { 
            currentUser = null; 
            purchasedToolIds = [];
            document.getElementById('loginBtn').style.display = 'flex'; 
            document.getElementById('userInfo').style.display = 'none'; 
        }
        loadAllTools();
    });
    
    async function loadAllTools() {
        showLoadingGrid();
        try {
            if (!window.db) {
                setTimeout(loadAllTools, 500);
                return;
            }
            const snapshot = await window.db.collection('tools').get();
            allTools = [];
            snapshot.forEach(doc => allTools.push({ id: doc.id, ...doc.data() }));
            applyFiltersAndSort();
        } catch (error) { 
            console.error("Lỗi load tools:", error);
            document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Lỗi tải dữ liệu</h3><p>Vui lòng thử lại sau</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#00f5ff;border:none;border-radius:30px;color:#000;cursor:pointer;">Tải lại</button></div>'; 
        }
    }
    
    function applyFiltersAndSort() {
        let result = [...allTools];
        if (currentCategory !== 'all') result = result.filter(t => t.category === currentCategory);
        if (searchKeyword.trim()) { const kw = searchKeyword.toLowerCase(); result = result.filter(t => t.name.toLowerCase().includes(kw) || (t.description && t.description.toLowerCase().includes(kw))); }
        if (currentSort === 'price-asc') result.sort((a,b) => (a.price||0) - (b.price||0));
        else if (currentSort === 'price-desc') result.sort((a,b) => (b.price||0) - (a.price||0));
        else result.sort((a,b) => { const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0); const db = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0); return db - da; });
        filteredTools = result;
        document.getElementById('totalCount').innerText = filteredTools.length;
        currentPage = 1;
        renderProducts();
        renderPagination();
    }
    
    function renderProducts() {
        const start = (currentPage-1)*itemsPerPage, end = start+itemsPerPage, pageTools = filteredTools.slice(start,end);
        document.getElementById('displayCount').innerText = pageTools.length;
        if(pageTools.length === 0){ 
            document.getElementById('productsGrid').innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Không tìm thấy sản phẩm</h3><p>Rất tiếc, không có sản phẩm nào phù hợp với tiêu chí của bạn</p></div>`;
            return; 
        }
        document.getElementById('productsGrid').innerHTML = pageTools.map((t, idx) => {
            const isPurchased = purchasedToolIds.includes(t.id);
            const actionButton = isPurchased 
                ? `<a href="products.html?id=${t.id}" class="btn-view-card"><i class="fas fa-eye"></i> Xem ngay</a>`
                : `<button class="btn-buy-card" onclick="buyTool('${t.id}', '${escapeHtml(t.name)}', ${t.price})"><i class="fas fa-shopping-cart"></i> Mua</button>`;
            
            return `
            <div class="tool-card" style="animation-delay: ${(idx % 9) * 0.05}s">
                <div class="tool-image-wrapper">
                    <img src="${t.image || 'https://placehold.co/600x400/1a1a1a/00f5ff?text=Tool'}" class="tool-image" onerror="this.src='https://placehold.co/600x400/1a1a1a/00f5ff?text=Tool'">
                    <span class="tool-category">${t.category === 'seo' ? 'SEO' : t.category === 'facebook' ? 'Facebook' : t.category === 'game' ? 'Game' : t.category === 'auto' ? 'Auto' : 'Premium'}</span>
                </div>
                <div class="tool-info">
                    <h3 class="tool-name">${escapeHtml(t.name)}</h3>
                    ${t.adminNote ? `<div class="admin-badge"><i class="fas fa-fire"></i> ${escapeHtml(t.adminNote)}</div>` : ''}
                    <div class="tool-langs">
                        ${(t.languages || []).map(lang => `<span class="lang-badge"><i class="${langIcons[lang]}"></i> ${langNames[lang]}</span>`).join('')}
                    </div>
                    <p class="tool-desc">${escapeHtml((t.shortDescription || t.description || '').replace(/<[^>]*>/g, '').substring(0, 100))}${((t.shortDescription || t.description || '').length > 100 ? '...' : '')}</p>
                    <div class="tool-price">${t.price === 0 ? 'Free' : formatPrice(t.price) + '<span>đ</span>'}</div>
                    <div class="card-buttons">
                        <a href="products.html?id=${t.id}" class="btn-detail"><i class="fas fa-eye"></i> Chi tiết</a>
                        ${actionButton}
                    </div>
                </div>
            </div>
        `}).join('');
    }
    
    function renderPagination() {
        const total = Math.ceil(filteredTools.length / itemsPerPage);
        if(total <= 1){ document.getElementById('pagination').innerHTML = ''; return; }
        let pages = [];
        if(total <= 7){ for(let i = 1; i <= total; i++) pages.push(i); }
        else{ pages.push(1); if(currentPage > 3) pages.push('...'); for(let i = Math.max(2, currentPage-1); i <= Math.min(total-1, currentPage+1); i++) pages.push(i); if(currentPage < total-2) pages.push('...'); pages.push(total); }
        document.getElementById('pagination').innerHTML = `
            <button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" onclick="changePage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>
            ${pages.map(p => p === '...' ? `<span class="page-dots">...</span>` : `<button class="page-btn ${currentPage === p ? 'active' : ''}" onclick="changePage(${p})">${p}</button>`).join('')}
            <button class="page-btn ${currentPage === total ? 'disabled' : ''}" onclick="changePage(${currentPage+1})" ${currentPage === total ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>
        `;
    }
    
    window.changePage = function(p){ const total = Math.ceil(filteredTools.length / itemsPerPage); if(p < 1 || p > total) return; currentPage = p; renderProducts(); renderPagination(); window.scrollTo({ top: 400, behavior: 'smooth' }); };
    
    window.buyTool = async (id, name, price) => {
        if(!currentUser){ 
            Swal.fire({
                title: 'Chưa đăng nhập',
                text: 'Bạn cần đăng nhập để mua tool!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Đăng nhập ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#00f5ff',
                cancelButtonColor: '#ef4444'
            }).then((result) => {
                if (result.isConfirmed) window.location.href = 'login.html';
            });
            return; 
        }
        if(price > 0 && userBalance < price){ 
            Swal.fire({
                title: 'Số dư không đủ!',
                text: `Bạn cần ${formatPrice(price)}đ nhưng chỉ có ${formatPrice(userBalance)}đ.\nVui lòng nạp thêm tiền.`,
                icon: 'error',
                showCancelButton: true,
                confirmButtonText: 'Nạp tiền ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#ef4444'
            }).then((result) => {
                if (result.isConfirmed) window.location.href = 'chuyentien.html';
            });
            return; 
        }
        if(price === 0){
            Swal.fire({
                title: 'Xác nhận tải tool miễn phí',
                text: `Bạn có chắc chắn muốn tải tool "${name}" miễn phí?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Có, tải ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#00f5ff',
                cancelButtonColor: '#ef4444'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const toolDoc = await window.db.collection('tools').doc(id).get();
                        const link = toolDoc.data().downloadLink || '#';
                        await window.db.collection('transactions').add({
                            userId: currentUser.uid,
                            userEmail: currentUser.email,
                            toolId: id,
                            toolName: name,
                            amount: 0,
                            type: 'purchase',
                            status: 'success',
                            downloadLink: link,
                            createdAt: new Date()
                        });
                        purchasedToolIds.push(id);
                        renderProducts();
                        Swal.fire({
                            title: 'Tải thành công!',
                            text: `Tool "${name}" đã sẵn sàng để tải.`,
                            icon: 'success',
                            confirmButtonText: 'Tải xuống',
                            background: '#121218',
                            color: '#fff',
                            confirmButtonColor: '#00f5ff'
                        }).then(() => {
                            if (link !== '#') window.open(link, '_blank');
                        });
                    } catch(e) {
                        Swal.fire({ title: 'Lỗi', text: e.message, icon: 'error', background: '#121218', color: '#fff', confirmButtonColor: '#00f5ff' });
                    }
                }
            });
            return;
        }
        
        Swal.fire({
            title: 'Xác nhận mua tool',
            html: `Bạn có chắc chắn muốn mua <strong>${name}</strong> với giá <strong style="color:#00f5ff">${formatPrice(price)}đ</strong>?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Có, mua ngay',
            cancelButtonText: 'Hủy',
            background: '#121218',
            color: '#fff',
            confirmButtonColor: '#00f5ff',
            cancelButtonColor: '#ef4444'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Đang xử lý...',
                    text: 'Vui lòng chờ trong giây lát',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); },
                    background: '#121218'
                });
                try{
                    const toolDoc = await window.db.collection('tools').doc(id).get();
                    const link = toolDoc.data().downloadLink || '#';
                    await window.db.runTransaction(async(t)=>{
                        const userRef = window.db.collection('users').doc(currentUser.uid);
                        const userDoc = await t.get(userRef);
                        const currentBalance = userDoc.data().balance || 0;
                        if (currentBalance < price) throw new Error("Số dư không đủ");
                        t.update(userRef,{balance: currentBalance - price});
                        t.set(window.db.collection('transactions').doc(),{userId:currentUser.uid,userEmail:currentUser.email,toolId:id,toolName:name,amount:price,type:'purchase',status:'success',downloadLink:link,createdAt:new Date()});
                    });
                    userBalance -= price;
                    document.getElementById('userBalance').innerText = userBalance.toLocaleString('vi-VN');
                    purchasedToolIds.push(id);
                    renderProducts();
                    Swal.fire({
                        title: 'Mua thành công!',
                        text: `Bạn đã mua tool "${name}" thành công.`,
                        icon: 'success',
                        confirmButtonText: 'Tải xuống ngay',
                        background: '#121218',
                        color: '#fff',
                        confirmButtonColor: '#00f5ff'
                    }).then(() => {
                        if (link !== '#') window.open(link, '_blank');
                    });
                } catch(e){ 
                    if(e.message === "Số dư không đủ") {
                        const userDoc = await window.db.collection('users').doc(currentUser.uid).get();
                        userBalance = userDoc.data().balance || 0;
                        document.getElementById('userBalance').innerText = userBalance.toLocaleString('vi-VN');
                        Swal.fire({
                            title: 'Số dư không đủ!',
                            text: `Giao dịch thất bại. Số dư hiện tại: ${formatPrice(userBalance)}đ`,
                            icon: 'error',
                            confirmButtonText: 'Nạp tiền',
                            background: '#121218',
                            color: '#fff',
                            confirmButtonColor: '#10b981'
                        }).then(() => { window.location.href = 'chuyentien.html'; });
                    } else {
                        Swal.fire({ title: 'Lỗi', text: e.message, icon: 'error', background: '#121218', color: '#fff', confirmButtonColor: '#00f5ff' });
                    }
                }
            }
        });
    };
    
    document.querySelectorAll('.filter-btn').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentCategory=b.dataset.category; applyFiltersAndSort(); }; });
    document.querySelectorAll('.sort-btn').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentSort=b.dataset.sort; applyFiltersAndSort(); }; });
    document.getElementById('searchInput').oninput = e => { searchKeyword = e.target.value; applyFiltersAndSort(); };
    
    document.getElementById('logoutBtn')?.addEventListener('click', async()=>{ await window.auth.signOut(); window.location.reload(); });
    
    function formatPrice(p){ 
        if (p === 0 || p === null || p === undefined) return 'Free';
        return p.toLocaleString('vi-VN'); 
    }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
</script>
</body>
</html>
