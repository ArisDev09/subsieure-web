<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Subsieure</title>
    <link rel="icon" type="image/png" href="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,245,255,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #00f5ff; border-radius: 10px; }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 16px 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            transition: all 0.3s;
        }
        .navbar.scrolled { padding: 12px 0; background: rgba(10,10,10,0.98); }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .nav-logo:hover { transform: scale(1.02); }
        .nav-logo img { height: 32px; }
        .nav-logo span { background: linear-gradient(135deg, #00f5ff, #0099cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            transition: all 0.3s;
        }
        .back-link:hover { color: #00f5ff; background: rgba(0,245,255,0.1); transform: translateX(-5px); }

        .product-detail { padding: 120px 0 60px; }
        .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 60px; }

        .product-gallery {
            background: #121218;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }
        .slider-images {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .slider-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .slider-image.active {
            opacity: 1;
            z-index: 1;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .slider-btn:hover {
            background: #00f5ff;
            color: #000;
            transform: translateY(-50%) scale(1.1);
        }
        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .slider-dot.active {
            background: #00f5ff;
            width: 24px;
            border-radius: 4px;
        }

        .product-info { animation: fadeInUp 0.6s ease 0.1s both; }
        .product-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
        .admin-note {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .language-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
        .lang-badge {
            background: rgba(0,245,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #00f5ff;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .lang-badge:hover { background: rgba(0,245,255,0.3); transform: translateY(-2px); }
        .product-price { font-size: 32px; font-weight: 800; color: #00f5ff; margin: 20px 0; }
        .btn-buy, .btn-download-product {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 48px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
        }
        .btn-buy {
            background: linear-gradient(135deg, #00f5ff, #0099cc);
            color: #000;
        }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,245,255,0.4); }
        .btn-download-product {
            background: rgba(0,245,255,0.15);
            color: #00f5ff;
            border: 1px solid rgba(0,245,255,0.3);
        }
        .btn-download-product:hover { background: rgba(0,245,255,0.3); transform: translateY(-3px); }
        .warning-box {
            background: rgba(255,107,107,0.1);
            border-left: 4px solid #ff6b6b;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
        }
        .warning-box p { color: #ff6b6b; font-size: 13px; margin: 4px 0; }

        .video-section, .setup-section, .long-description {
            margin-top: 40px;
            background: rgba(18,18,24,0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease;
        }
        .video-section:hover, .setup-section:hover, .long-description:hover {
            border-color: rgba(0,245,255,0.2);
            transform: translateY(-3px);
        }
        .video-section h3, .setup-section h3, .long-description h3 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .setup-command {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            color: #00f5ff;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .long-description-content {
            color: #aaa;
            line-height: 1.8;
            font-size: 15px;
        }
        .long-description-content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }

        .loading-state { text-align: center; padding: 100px; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0,245,255,0.15);
            border-top-color: #00f5ff;
            border-right-color: #ff6b6b;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 100px; background: rgba(255,255,255,0.02); border-radius: 32px; }
        .error-state i { font-size: 64px; color: #ff6b6b; margin-bottom: 20px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .product-header h1 { font-size: 28px; }
        }
        @media (max-width: 768px) {
            .product-layout { grid-template-columns: 1fr; gap: 32px; }
            .product-header h1 { font-size: 24px; }
            .slider-btn { width: 36px; height: 36px; font-size: 14px; }
            .video-section, .setup-section, .long-description { padding: 20px; }
        }
    </style>
</head>
<body>

<script src="js/loading.js"></script>
<div class="cursor-glow" id="cursorGlow"></div>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">
            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png" alt="Subsieure">
            <span>Subsieure</span>
        </a>
        <a href="sanpham.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </div>
</nav>

<div class="container product-detail" id="productContainer"></div>

<script src="js/products.js"></script>
</body>
</html>
