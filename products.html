<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Subsieure</title>
    <link rel="icon" type="image/png" href="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,245,255,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #00f5ff; border-radius: 10px; }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 16px 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            transition: all 0.3s;
        }
        .navbar.scrolled { padding: 12px 0; background: rgba(10,10,10,0.98); }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .nav-logo:hover { transform: scale(1.02); }
        .nav-logo img { height: 32px; }
        .nav-logo span { background: linear-gradient(135deg, #00f5ff, #0099cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            transition: all 0.3s;
        }
        .back-link:hover { color: #00f5ff; background: rgba(0,245,255,0.1); transform: translateX(-5px); }

        .product-detail { padding: 120px 0 60px; }
        .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 60px; }

        .product-gallery {
            background: #121218;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .slider-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }
        .slider-images {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .slider-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .slider-image.active {
            opacity: 1;
            z-index: 1;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .slider-btn:hover {
            background: #00f5ff;
            color: #000;
            transform: translateY(-50%) scale(1.1);
        }
        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .slider-dot.active {
            background: #00f5ff;
            width: 24px;
            border-radius: 4px;
        }

        .product-info { animation: fadeInUp 0.6s ease 0.1s both; }
        .product-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
        .admin-note {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .language-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
        .lang-badge {
            background: rgba(0,245,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #00f5ff;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .lang-badge:hover { background: rgba(0,245,255,0.3); transform: translateY(-2px); }
        .product-price { font-size: 32px; font-weight: 800; color: #00f5ff; margin: 20px 0; }
        .btn-buy, .btn-download-product {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 48px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
        }
        .btn-buy {
            background: linear-gradient(135deg, #00f5ff, #0099cc);
            color: #000;
        }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,245,255,0.4); }
        .btn-download-product {
            background: rgba(0,245,255,0.15);
            color: #00f5ff;
            border: 1px solid rgba(0,245,255,0.3);
        }
        .btn-download-product:hover { background: rgba(0,245,255,0.3); transform: translateY(-3px); }
        .warning-box {
            background: rgba(255,107,107,0.1);
            border-left: 4px solid #ff6b6b;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
        }
        .warning-box p { color: #ff6b6b; font-size: 13px; margin: 4px 0; }

        .video-section, .setup-section, .long-description {
            margin-top: 40px;
            background: rgba(18,18,24,0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease;
        }
        .video-section:hover, .setup-section:hover, .long-description:hover {
            border-color: rgba(0,245,255,0.2);
            transform: translateY(-3px);
        }
        .video-section h3, .setup-section h3, .long-description h3 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .setup-command {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            color: #00f5ff;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .long-description-content {
            color: #aaa;
            line-height: 1.8;
            font-size: 15px;
        }
        .long-description-content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }

        .loading-state { text-align: center; padding: 100px; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0,245,255,0.15);
            border-top-color: #00f5ff;
            border-right-color: #ff6b6b;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { text-align: center; padding: 100px; background: rgba(255,255,255,0.02); border-radius: 32px; }
        .error-state i { font-size: 64px; color: #ff6b6b; margin-bottom: 20px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .product-header h1 { font-size: 28px; }
        }
        @media (max-width: 768px) {
            .product-layout { grid-template-columns: 1fr; gap: 32px; }
            .product-header h1 { font-size: 24px; }
            .slider-btn { width: 36px; height: 36px; font-size: 14px; }
            .video-section, .setup-section, .long-description { padding: 20px; }
        }
    </style>
</head>
<body>
<script src="js/loading.js"></script>
<div class="cursor-glow" id="cursorGlow"></div>

<nav class="navbar" id="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">
            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png" alt="Subsieure">
            <span>Subsieure</span>
        </a>
        <a href="sanpham.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </div>
</nav>

<div class="container product-detail" id="productContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDyLM8PdOKwpzXu-SHV3YAzU28gL2QE4KY",
        authDomain: "subsieure-toolshop.firebaseapp.com",
        projectId: "subsieure-toolshop",
        storageBucket: "subsieure-toolshop.firebasestorage.app",
        messagingSenderId: "277182125256",
        appId: "1:277182125256:web:b0a98cb19d06d046ce81fd"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentTool = null;
    let currentImageIndex = 0;
    let allImages = [];
    let currentUser = null;
    let userBalance = 0;
    let isPurchased = false;
    let downloadLink = '#';

    function getToolId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    const cursorGlow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
    });

    window.addEventListener('scroll', () => {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });

    function initSlider() {
        const images = allImages;
        if (images.length <= 1) return;

        const prevBtn = document.getElementById('sliderPrev');
        const nextBtn = document.getElementById('sliderNext');
        const dotsContainer = document.getElementById('sliderDots');

        dotsContainer.innerHTML = '';
        for (let i = 0; i < images.length; i++) {
            const dot = document.createElement('div');
            dot.className = 'slider-dot' + (i === currentImageIndex ? ' active' : '');
            dot.onclick = () => showImage(i);
            dotsContainer.appendChild(dot);
        }

        if (prevBtn) {
            prevBtn.onclick = () => {
                currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
                showImage(currentImageIndex);
            };
        }
        if (nextBtn) {
            nextBtn.onclick = () => {
                currentImageIndex = (currentImageIndex + 1) % images.length;
                showImage(currentImageIndex);
            };
        }
    }

    function showImage(index) {
        const slides = document.querySelectorAll('.slider-image');
        const dots = document.querySelectorAll('.slider-dot');
        slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
        dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        currentImageIndex = index;
    }

    async function checkPurchased(toolId) {
        if (!currentUser) return false;
        try {
            const snapshot = await db.collection('transactions')
                .where('userId', '==', currentUser.uid)
                .where('toolId', '==', toolId)
                .where('type', '==', 'purchase')
                .get();
            return !snapshot.empty;
        } catch (error) {
            console.error("Lỗi kiểm tra đã mua:", error);
            return false;
        }
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                userBalance = userDoc.data()?.balance || 0;
            } catch(e) { console.error("Lỗi lấy user:", e); }
        } else {
            currentUser = null;
            userBalance = 0;
        }
        await loadProduct();
    });

    async function loadProduct() {
        const toolId = getToolId();
        
        if (!toolId) {
            document.getElementById('productContainer').innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Không tìm thấy sản phẩm</h3>
                    <p>ID sản phẩm không hợp lệ</p>
                </div>
            `;
            return;
        }

        document.getElementById('productContainer').innerHTML = `
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Đang tải thông tin sản phẩm...</p>
            </div>
        `;

        try {
            const doc = await db.collection('tools').doc(toolId).get();
            
            if (!doc.exists) {
                document.getElementById('productContainer').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-search"></i>
                        <h3>Sản phẩm không tồn tại</h3>
                        <p>Vui lòng quay lại trang sản phẩm</p>
                        <a href="sanpham.html" style="color:#00f5ff; margin-top:20px; display:inline-block;">← Quay lại trang sản phẩm</a>
                    </div>
                `;
                return;
            }

            currentTool = { id: doc.id, ...doc.data() };
            downloadLink = currentTool.downloadLink || '#';
            
            isPurchased = await checkPurchased(toolId);
            
            allImages = [];
            if (currentTool.image && currentTool.image.trim()) {
                allImages.push(currentTool.image);
            }
            if (currentTool.screenshots && Array.isArray(currentTool.screenshots)) {
                allImages.push(...currentTool.screenshots.filter(img => img && img.trim()));
            }
            if (allImages.length === 0) {
                allImages = ['https://placehold.co/800x450/1a1a1a/00f5ff?text=No+Image'];
            }

            renderProduct();
        } catch (error) {
            console.error('Lỗi load sản phẩm:', error);
            document.getElementById('productContainer').innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Lỗi kết nối</h3>
                    <p>${error.message}</p>
                    <button onclick="location.reload()" style="background:#00f5ff; color:#000; border:none; padding:12px 24px; border-radius:30px; margin-top:20px; cursor:pointer;">Thử lại</button>
                </div>
            `;
        }
    }

    function renderProduct() {
        const tool = currentTool;
        const container = document.getElementById('productContainer');

        let videoId = '';
        if (tool.videoUrl && tool.videoUrl.includes('youtube.com/watch?v=')) {
            videoId = tool.videoUrl.split('v=')[1]?.split('&')[0];
        } else if (tool.videoUrl && tool.videoUrl.includes('youtu.be/')) {
            videoId = tool.videoUrl.split('youtu.be/')[1]?.split('?')[0];
        }

        const langNames = { python: 'Python', rust: 'Rust', cpp: 'C++', html: 'HTML', js: 'JavaScript', php: 'PHP', java: 'Java', go: 'Go' };
        const langIcons = { python: 'fab fa-python', rust: 'fas fa-cog', cpp: 'fas fa-code', html: 'fab fa-html5', js: 'fab fa-js', php: 'fab fa-php', java: 'fab fa-java', go: 'fab fa-golang' };

        const priceDisplay = tool.price === 0 ? 'Free' : tool.price.toLocaleString('vi-VN') + 'đ';
        
        let actionButton = '';
        if (isPurchased) {
            actionButton = `<a href="${downloadLink}" target="_blank" class="btn-download-product"><i class="fas fa-download"></i> Tải xuống ngay</a>`;
        } else if (tool.price === 0) {
            actionButton = `<button class="btn-buy" onclick="buyNow()"><i class="fas fa-download"></i> Tải ngay - Free</button>`;
        } else {
            actionButton = `<button class="btn-buy" onclick="buyNow()"><i class="fas fa-shopping-cart"></i> Mua ngay - ${tool.price.toLocaleString('vi-VN')}đ</button>`;
        }

        let sliderHTML = '';
        if (allImages.length === 1) {
            sliderHTML = `<div class="slider-container"><div class="slider-images"><img src="${escapeHtml(allImages[0])}" class="slider-image active" onerror="this.src='https://placehold.co/800x450/1a1a1a/00f5ff?text=No+Image'"></div></div>`;
        } else {
            sliderHTML = `
                <div class="slider-container">
                    <div class="slider-images">
                        ${allImages.map((img, idx) => `<img src="${escapeHtml(img)}" class="slider-image ${idx === 0 ? 'active' : ''}" onerror="this.src='https://placehold.co/800x450/1a1a1a/00f5ff?text=No+Image'">`).join('')}
                    </div>
                    <button class="slider-btn slider-prev" id="sliderPrev"><i class="fas fa-chevron-left"></i></button>
                    <button class="slider-btn slider-next" id="sliderNext"><i class="fas fa-chevron-right"></i></button>
                    <div class="slider-dots" id="sliderDots"></div>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="product-layout">
                <div class="product-gallery">${sliderHTML}</div>
                <div class="product-info">
                    ${tool.adminNote ? `<div class="admin-note"><i class="fas fa-fire"></i> ${escapeHtml(tool.adminNote)}</div>` : ''}
                    <div class="product-header"><h1>${escapeHtml(tool.name)}</h1></div>
                    <div class="language-tags">
                        ${(tool.languages || []).map(lang => `<span class="lang-badge"><i class="${langIcons[lang]}"></i> ${langNames[lang]}</span>`).join('')}
                    </div>
                    <div class="product-price">${priceDisplay}</div>
                    ${tool.warningMessage ? `<div class="warning-box">${tool.warningMessage.split('\n').map(line => `<p><i class="fas fa-exclamation-triangle"></i> ${escapeHtml(line)}</p>`).join('')}</div>` : ''}
                    ${actionButton}
                    ${isPurchased ? '' : `<div style="font-size:12px; color:#666; margin-top:12px; text-align:center;"><i class="fas fa-shield-alt"></i> Bảo hành trọn đời sau khi mua</div>`}
                </div>
            </div>
            ${tool.videoUrl && videoId ? `
            <div class="video-section">
                <h3><i class="fas fa-play-circle" style="color:#00f5ff;"></i> Video Demo</h3>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            ` : ''}
            ${tool.setupCommand ? `
            <div class="setup-section">
                <h3><i class="fas fa-terminal" style="color:#00f5ff;"></i> Lệnh Setup</h3>
                <div class="setup-command">${escapeHtml(tool.setupCommand)}</div>
            </div>
            ` : ''}
            <div class="long-description">
                <h3><i class="fas fa-align-left" style="color:#00f5ff;"></i> Mô tả chi tiết</h3>
                <div class="long-description-content">${tool.description || tool.longDescription || 'Không có mô tả chi tiết.'}</div>
            </div>
        `;

        if (allImages.length > 1) initSlider();
    }

    window.buyNow = async () => {
        if (!currentTool) return;
        
        if (isPurchased) {
            if (downloadLink !== '#') {
                window.open(downloadLink, '_blank');
            } else {
                Swal.fire({
                    title: 'Liên hệ Admin',
                    text: 'Vui lòng liên hệ Admin qua Zalo để nhận link tải.',
                    icon: 'info',
                    background: '#121218',
                    color: '#fff',
                    confirmButtonColor: '#00f5ff'
                });
            }
            return;
        }
        
        if (currentTool.price === 0) {
            Swal.fire({
                title: 'Xác nhận tải tool miễn phí',
                text: `Bạn có chắc chắn muốn tải tool "${currentTool.name}" miễn phí?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Có, tải ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#00f5ff',
                cancelButtonColor: '#ef4444'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await db.collection('transactions').add({
                            userId: currentUser.uid,
                            userEmail: currentUser.email,
                            toolId: currentTool.id,
                            toolName: currentTool.name,
                            amount: 0,
                            type: 'purchase',
                            status: 'success',
                            downloadLink: currentTool.downloadLink || '#',
                            createdAt: new Date()
                        });
                        isPurchased = true;
                        renderProduct();
                        if (currentTool.downloadLink && currentTool.downloadLink !== '#') {
                            window.open(currentTool.downloadLink, '_blank');
                        }
                        Swal.fire({
                            title: 'Thành công!',
                            text: 'Tool đã được thêm vào thư viện của bạn.',
                            icon: 'success',
                            background: '#121218',
                            color: '#fff',
                            confirmButtonColor: '#00f5ff',
                            timer: 1500
                        });
                    } catch(e) {
                        Swal.fire({ title: 'Lỗi', text: e.message, icon: 'error', background: '#121218', color: '#fff', confirmButtonColor: '#00f5ff' });
                    }
                }
            });
            return;
        }
        
        if (!currentUser) {
            Swal.fire({
                title: 'Chưa đăng nhập',
                text: 'Bạn cần đăng nhập để mua tool!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Đăng nhập ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#00f5ff',
                cancelButtonColor: '#ef4444'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = 'login.html';
                }
            });
            return;
        }
        
        if (userBalance < currentTool.price) {
            Swal.fire({
                title: 'Số dư không đủ!',
                text: `Bạn cần ${currentTool.price.toLocaleString('vi-VN')}đ nhưng chỉ có ${userBalance.toLocaleString('vi-VN')}đ.\nVui lòng nạp thêm tiền.`,
                icon: 'error',
                showCancelButton: true,
                confirmButtonText: 'Nạp tiền ngay',
                cancelButtonText: 'Hủy',
                background: '#121218',
                color: '#fff',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#ef4444'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = 'chuyentien.html';
                }
            });
            return;
        }
        
        Swal.fire({
            title: 'Xác nhận mua tool',
            html: `Bạn có chắc chắn muốn mua <strong>${currentTool.name}</strong> với giá <strong style="color:#00f5ff">${currentTool.price.toLocaleString('vi-VN')}đ</strong>?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Có, mua ngay',
            cancelButtonText: 'Hủy',
            background: '#121218',
            color: '#fff',
            confirmButtonColor: '#00f5ff',
            cancelButtonColor: '#ef4444'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Đang xử lý...',
                    text: 'Vui lòng chờ trong giây lát',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); },
                    background: '#121218'
                });
                
                try {
                    const link = currentTool.downloadLink || '#';
                    
                    await db.runTransaction(async (transaction) => {
                        const userRef = db.collection('users').doc(currentUser.uid);
                        const userDoc = await transaction.get(userRef);
                        const currentBalance = userDoc.data().balance || 0;
                        if (currentBalance < currentTool.price) throw new Error("Số dư không đủ");
                        transaction.update(userRef, { balance: currentBalance - currentTool.price });
                        transaction.set(db.collection('transactions').doc(), {
                            userId: currentUser.uid,
                            userEmail: currentUser.email,
                            toolId: currentTool.id,
                            toolName: currentTool.name,
                            amount: currentTool.price,
                            type: 'purchase',
                            status: 'success',
                            downloadLink: link,
                            createdAt: new Date()
                        });
                    });
                    
                    userBalance -= currentTool.price;
                    isPurchased = true;
                    renderProduct();
                    
                    Swal.fire({
                        title: 'Mua thành công!',
                        text: `Bạn đã mua tool "${currentTool.name}" thành công.`,
                        icon: 'success',
                        confirmButtonText: 'Tải xuống ngay',
                        background: '#121218',
                        color: '#fff',
                        confirmButtonColor: '#00f5ff'
                    }).then(() => {
                        if (link !== '#') window.open(link, '_blank');
                    });
                    
                } catch (e) {
                    if (e.message === "Số dư không đủ") {
                        const userDoc = await db.collection('users').doc(currentUser.uid).get();
                        userBalance = userDoc.data().balance || 0;
                        Swal.fire({
                            title: 'Số dư không đủ!',
                            text: `Giao dịch thất bại. Số dư hiện tại: ${userBalance.toLocaleString('vi-VN')}đ`,
                            icon: 'error',
                            confirmButtonText: 'Nạp tiền',
                            background: '#121218',
                            color: '#fff',
                            confirmButtonColor: '#10b981'
                        }).then(() => { window.location.href = 'chuyentien.html'; });
                    } else {
                        Swal.fire({
                            title: 'Lỗi',
                            text: e.message,
                            icon: 'error',
                            background: '#121218',
                            color: '#fff',
                            confirmButtonColor: '#00f5ff'
                        });
                    }
                }
            }
        });
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
</script>
