<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Subsieure</title>
    <link rel="icon" type="image/png" href="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00f5ff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --gradient-1: linear-gradient(135deg, #00f5ff, #00d4ff, #0099cc);
            --border-light: rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }
        
        * { cursor: url('https://play.vsthemes.org/t-cursors/14438/8d5360f7ad20a4ef01852cb9ac24c765.webp'), auto; }
        a, button { cursor: url('https://play.vsthemes.org/t-cursors/14438/8d5360f7ad20a4ef01852cb9ac24c765.webp'), pointer; }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        
        .navbar { position: fixed; top: 0; width: 100%; padding: 16px 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); z-index: 1000; }
        .nav-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; }
        .nav-logo img { height: 32px; width: auto; }
        .nav-logo span { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-logout { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; margin-left: 20px; }
        
        .dashboard-container { padding-top: 100px; padding-bottom: 60px; }
        .balance-card { background: linear-gradient(135deg, #121218, #0d0d12); border-radius: 32px; padding: 40px; margin-bottom: 48px; border: 1px solid rgba(0,245,255,0.2); text-align: center; }
        .balance-card h3 { font-size: 16px; color: var(--text-muted); margin-bottom: 16px; }
        .balance-amount { font-size: 56px; font-weight: 800; color: #00f5ff; margin-bottom: 16px; }
        .balance-note { font-size: 14px; color: var(--text-muted); }
        .balance-note i { color: #10b981; margin-right: 8px; }
        
        .section-title { font-size: 28px; font-weight: 700; margin-bottom: 32px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .tool-card { background: #121218; border-radius: 24px; overflow: hidden; border: 1px solid var(--border-light); transition: all 0.3s; }
        .tool-card:hover { transform: translateY(-5px); border-color: rgba(0,245,255,0.3); }
        .tool-info { padding: 24px; }
        .tool-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .tool-price { font-size: 24px; font-weight: 800; color: #00f5ff; margin: 16px 0; }
        .btn-download { display: inline-block; padding: 12px 24px; background: var(--gradient-1); border-radius: 40px; color: #000; font-weight: 600; text-decoration: none; text-align: center; width: 100%; }
        
        .transactions-table { width: 100%; background: #121218; border-radius: 20px; overflow: hidden; }
        .transactions-table th, .transactions-table td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-light); }
        .transactions-table th { background: #0a0a0a; color: #00f5ff; font-weight: 600; }
        .empty-state { text-align: center; padding: 60px; background: rgba(255,255,255,0.02); border-radius: 24px; }
        .empty-state i { font-size: 48px; color: var(--text-muted); margin-bottom: 16px; }
        
        .footer { border-top: 1px solid var(--border-light); padding: 40px 0; text-align: center; margin-top: 60px; }
        .footer-copyright { color: var(--text-muted); font-size: 14px; }
        
        @media (max-width: 768px) {
            .balance-amount { font-size: 36px; }
            .section-title { font-size: 24px; }
            .tools-grid { grid-template-columns: 1fr; }
            .empty-state { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png" alt="Subsieure" style="height: 32px;">
            <span>Subsieure</span>
        </a>
        <div><a href="index.html" style="color: var(--text-secondary); text-decoration: none;">Trang chủ</a><button class="btn-logout" id="logoutDashboard"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button></div>
    </div>
</nav>

<div class="container dashboard-container">
    <div class="balance-card"><h3><i class="fas fa-wallet"></i> Số dư tài khoản</h3><div class="balance-amount" id="userBalance">0đ</div><div class="balance-note"><i class="fas fa-info-circle"></i> Liên hệ Admin qua Zalo 0986.947.309 để nạp thêm tiền</div></div>
    <h2 class="section-title"><i class="fas fa-download" style="color: #00f5ff; margin-right: 12px;"></i> Tool đã mua</h2>
    <div id="purchasedTools" class="tools-grid"><div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><p>Đang tải...</p></div></div>
    <h2 class="section-title" style="margin-top: 48px;"><i class="fas fa-history" style="color: #00f5ff; margin-right: 12px;"></i> Lịch sử giao dịch</h2>
    <div style="overflow-x: auto;"><table class="transactions-table"><thead><tr><th>Sản phẩm</th><th>Số tiền</th><th>Loại</th><th>Link tải</th><th>Thời gian</th></tr></thead><tbody id="transactionsList"><tr><td colspan="5" style="text-align: center;">Đang tải...</td></tr></tbody></table></div>
</div>

<footer class="footer"><div class="container"><div class="footer-copyright"><p>&copy; 2026 Subsieure - Nguyễn Vinh Cypher</p></div></div></footer>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
    function formatPrice(p){ 
        if (p === 0 || p === null || p === undefined) return 'Free';
        return p.toLocaleString('vi-VN'); 
    }
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        const userDoc = await db.collection('users').doc(user.uid).get();
        document.getElementById('userBalance').innerText = (userDoc.data()?.balance || 0).toLocaleString('vi-VN') + 'đ';
        await loadPurchased(user.uid);
        await loadTransactions(user.uid);
    });
    async function loadPurchased(uid) {
        const s = await db.collection('transactions').where('userId','==',uid).where('type','==','purchase').get();
        const tools = []; s.forEach(d=>tools.push(d.data()));
        const container = document.getElementById('purchasedTools');
        if(tools.length===0){ container.innerHTML='<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Bạn chưa mua tool nào</p></div>'; return; }
        container.innerHTML = tools.map(t=>`<div class="tool-card"><div class="tool-info"><h3 class="tool-name">${escapeHtml(t.toolName)}</h3><div class="tool-price">${t.amount === 0 ? 'Free' : formatPrice(t.amount) + 'đ'}</div><a href="${t.downloadLink||'#'}" target="_blank" class="btn-download"><i class="fas fa-download"></i> Tải xuống</a></div></div>`).join('');
    }
    async function loadTransactions(uid) {
        const s = await db.collection('transactions').where('userId','==',uid).orderBy('createdAt','desc').get();
        const tbody = document.getElementById('transactionsList');
        if(s.empty){ tbody.innerHTML='<tr><td colspan="5" style="text-align:center;">Chưa có giao dịch</td></tr>'; return; }
        tbody.innerHTML='';
        s.forEach(d=>{ const t=d.data(); tbody.innerHTML+=`<tr><td>${escapeHtml(t.toolName||'Nạp tiền')}</td><td style="color:${t.type==='purchase'?'#ef4444':'#10b981'}">${t.type==='purchase'?'-':'+'}${formatPrice(t.amount)}${t.amount !== 0 ? 'đ' : ''}</td><td>${t.type==='purchase'?'Mua tool':'Nạp tiền'}</td><td>${t.downloadLink?`<a href="${t.downloadLink}" target="_blank" style="color:#00f5ff;">Link tải</a>`:'--'}</td><td>${t.createdAt?.toDate().toLocaleString('vi-VN')||'N/A'}</td>`; });
    }
    document.getElementById('logoutDashboard').onclick = async()=>{ await auth.signOut(); window.location.href='index.html'; };
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
</script>
</body>
</html>
