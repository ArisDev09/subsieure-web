<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Subsieure</title>
    <link rel="icon" type="image/png" href="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 50% 50%, rgba(0,245,255,0.08), #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-container { width: 100%; max-width: 480px; padding: 20px; }
        .forgot-card {
            background: rgba(18,18,24,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .back-home:hover { color: #00f5ff; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo img { height: 60px; width: auto; margin-bottom: 12px; }
        .logo h1 { font-size: 28px; margin-top: 8px; color: white; }
        .logo span { color: #00f5ff; }
        .forgot-header { text-align: center; margin-bottom: 32px; }
        .forgot-header h2 { font-size: 28px; margin-bottom: 8px; color: white; }
        .forgot-header p { color: #aaa; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #00f5ff; box-shadow: 0 0 0 3px rgba(0,245,255,0.1); }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f5ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,245,255,0.3); }
        .footer-text { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #2a2a2a; }
        .footer-text a { color: #00f5ff; text-decoration: none; }
        @media (max-width: 480px) { .forgot-card { padding: 32px 24px; } .logo img { height: 48px; } }
    </style>
</head>
<body>

<div class="forgot-container">
    <a href="login.html" class="back-home"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    <div class="forgot-card">
        <div class="logo">
            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778429322279_xe9Oxxk0FV.png" alt="Subsieure">
            <h1>Sub<span>sieure</span></h1>
        </div>
        <div class="forgot-header">
            <h2>Quên mật khẩu?</h2>
            <p>Nhập email của bạn để nhận link đặt lại mật khẩu</p>
        </div>
        <form id="forgotForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <button type="submit" class="btn-submit">Gửi link đặt lại mật khẩu</button>
        </form>
        <div class="footer-text">
            <p style="color: white;">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
    const forgotForm = document.getElementById('forgotForm');
    forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        
        Swal.fire({ title: 'Đang xử lý...', text: 'Vui lòng chờ', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        try {
            await auth.sendPasswordResetEmail(email);
            Swal.fire({ icon: 'success', title: 'Đã gửi email!', text: `Link đặt lại mật khẩu đã gửi đến ${email}`, confirmButtonColor: '#00f5ff' });
            document.getElementById('email').value = '';
        } catch (error) {
            let msg = error.code === 'auth/user-not-found' ? 'Không tìm thấy tài khoản' : error.message;
            Swal.fire({ icon: 'error', title: 'Lỗi', text: msg, confirmButtonColor: '#00f5ff' });
        }
    });
</script>
</body>
</html>
